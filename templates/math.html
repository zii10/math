<!DOCTYPE html>
<html>
<head>
    <title>簡單計算機</title>
</head>
<body>
    <h1>計算機</h1>

    <form method="POST">
        <input name="a" type="number" step="any" required>
        <select name="op">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
        <input name="b" type="number" step="any" required>
        <button type="submit">計算</button>
    </form>

    {% if result is not none %}
        <h2>結果：{{ result }}</h2>
    {% endif %}
</body>
</html>
